<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Itinerario SZ328</title>
  <style>
    body { margin:0; font-family: Arial, Helvetica, sans-serif; background:#0b1020; color:#e9eefc; }
    .wrap { padding:24px; }
    .nav { margin-bottom:14px; display:flex; gap:10px; }
    .btn {
      display:inline-block; padding:10px 14px; border-radius:12px;
      border:1px solid rgba(255,255,255,.15); color:#e9eefc; text-decoration:none;
      background: rgba(255,255,255,.06);
    }
    .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
    .title { font-size:28px; letter-spacing:1px; }
    .subtitle { font-size:14px; opacity:.8; }
    .kpis { display:flex; gap:18px; font-size:14px; }
    .card { border:1px solid rgba(255,255,255,.12); border-radius:16px; overflow:hidden; }
    table { width:100%; border-collapse:collapse; }
    thead { background: rgba(255,255,255,.06); }
    th, td { padding:14px 16px; border-bottom:1px solid rgba(255,255,255,.10); font-size:18px; text-align:center; }
    th { font-size:12px; letter-spacing:1.5px; opacity:.85; }
    tr:last-child td { border-bottom:none; }
    .time { font-weight:800; letter-spacing:.5px; }
    .loc { opacity:.92; }
    .banner {
      margin: 10px 0 16px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.06);
      font-size: 14px;
      opacity: .95;
    }
    .err {
      border-color: rgba(255,80,80,.35);
      background: rgba(255,80,80,.10);
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="nav">
    <a class="btn" href="/">← Pasajeros</a>
    <a class="btn" href="/events">Horarios</a>
  </div>

  <div class="top">
    <div>
      <div class="title">🕒 ITINERARIO — SZ328</div>
      <div class="subtitle">Horarios, locaciones y momentos clave</div>
    </div>
    <div class="kpis">
      <div id="k1">EVENTOS: —</div>
      <div id="k3">EN VIVO</div>
    </div>
  </div>

  <div id="banner" class="banner">Cargando horarios…</div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>HORA</th>
          <th>EVENTO</th>
          <th>LOCACIÓN</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
let rows = [];
let pageSize = 10;
let rotateSeconds = 6;
let page = 0;

function setBanner(msg, isError=false) {
  const b = document.getElementById("banner");
  b.textContent = msg;
  b.className = isError ? "banner err" : "banner";
}

function render() {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  const start = page * pageSize;
  const slice = rows.slice(start, start + pageSize);

  slice.forEach(r => {
    const tr = document.createElement("tr");

    const tdHora = document.createElement("td");
    tdHora.className = "time";
    tdHora.textContent = (r["Hora"] ?? "").toString();
    tr.appendChild(tdHora);

    const tdEv = document.createElement("td");
    tdEv.textContent = (r["Evento"] ?? "").toString();
    tr.appendChild(tdEv);

    const tdLoc = document.createElement("td");
    tdLoc.className = "loc";
    tdLoc.textContent = (r["Locación"] ?? "").toString();
    tr.appendChild(tdLoc);

    tbody.appendChild(tr);
  });

  document.getElementById("k1").textContent = `EVENTOS: ${rows.length}`;
  setBanner(rows.length ? "OK ✅" : "No hay eventos cargados todavía.");
}

async function fetchData() {
  try {
    const res = await fetch("/data/events", { cache: "no-store" }); // ✅ ESTA ES LA RUTA CORRECTA

    if (!res.ok) {
      const t = await res.text();
      setBanner(`Error HTTP ${res.status}\n${t.slice(0, 400)}`, true);
      return;
    }

    const json = await res.json();
    rows = json.rows || [];
    pageSize = json.page_size || pageSize;
    rotateSeconds = json.rotate_seconds || rotateSeconds;

    const maxPage = Math.max(0, Math.ceil(rows.length / pageSize) - 1);
    if (page > maxPage) page = 0;

    render();
  } catch (e) {
    setBanner("Error al cargar /data/events:\n" + e, true);
  }
}

function rotatePage() {
  const maxPage = Math.max(0, Math.ceil(rows.length / pageSize) - 1);
  page = maxPage === 0 ? 0 : (page >= maxPage ? 0 : page + 1);
  render();
}

fetchData();
setInterval(fetchData, 5000);
setInterval(rotatePage, rotateSeconds * 1000);
</script>
</body>
</html>
