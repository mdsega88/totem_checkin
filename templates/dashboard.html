<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard Totem SZ328</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #001a38;
      color: #fffcf4;
    }

    .wrap {
      padding: 16px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      margin-bottom: 12px;
      border: 1px solid rgba(255, 252, 244, .12);
      border-radius: 14px;
      background: rgba(255, 252, 244, .04);
    }

    .title {
      font-size: 18px;
      letter-spacing: 1px;
      font-weight: 800;
    }

    .subtitle {
      font-size: 12px;
      opacity: .8;
    }

    .clock-container {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .live-indicator {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .clock {
      font-size: 12px;
      opacity: .85;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .panel {
      border: 1px solid rgba(255, 252, 244, .12);
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255, 252, 244, .03);
      min-height: 360px;
      display: flex;
      flex-direction: column;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: rgba(255, 252, 244, .06);
      border-bottom: 1px solid rgba(255, 252, 244, .10);
    }

    .panel-title {
      font-size: 12px;
      letter-spacing: 1.6px;
      opacity: .9;
      font-weight: 800;
    }

    .panel-kpi {
      font-size: 12px;
      opacity: .85;
    }

    .panel-body {
      padding: 10px 10px 12px;
      flex: 1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 8px 8px;
      border-bottom: 1px solid rgba(255, 252, 244, .08);
      font-size: 13px;
      text-align: center;
    }

    th {
      font-size: 10px;
      letter-spacing: 1.2px;
      opacity: .8;
      background: rgba(255, 252, 244, .04);
    }

    tr:last-child td {
      border-bottom: none;
    }

    /* Make passenger table bold */
    #pax_tbody td {
      font-weight: 800;
      text-transform: uppercase;
    }

    .status-on {
      color: #9cffc0;
      font-weight: 800;
    }

    .status-del {
      color: #d43735;
      font-weight: 800;
    }

    .selfie {
      width: 34px;
      height: 46px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid rgba(255, 252, 244, .18);
      background: rgba(255, 252, 244, .06);
      display: inline-block;
    }

    .selfie-empty {
      width: 34px;
      height: 46px;
      border-radius: 8px;
      border: 1px dashed rgba(255, 252, 244, .18);
      opacity: .5;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .banner {
      margin-bottom: 10px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255, 252, 244, .12);
      background: rgba(255, 252, 244, .04);
      font-size: 12px;
      opacity: .9;
      white-space: pre-wrap;
    }

    .err {
      border-color: rgba(255, 80, 80, .35);
      background: rgba(255, 80, 80, .10);
    }

    /* ✅ Métrica activa (card dentro del panel Métricas) - solo dinámicas */
    .metric-card {
      margin-bottom: 15px;
      padding: 10px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255, 252, 244, .12);
      background: rgba(255, 252, 244, .04);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .metric-icon {
      font-size: 22px;
    }

    .metric-text {
      text-align: center;
    }

    .metric-title {
      font-size: 11px;
      letter-spacing: 1.1px;
      opacity: .85;
      font-weight: 800;
    }

    .metric-value {
      font-size: 16px;
      font-weight: 900;
      margin-top: 2px;
    }

    .metric-sub {
      font-size: 11px;
      opacity: .75;
      margin-top: 2px;
    }

    /* ✅ Métricas fijas */
    .fixed-metric {
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 252, 244, .12);
      background: rgba(255, 252, 244, .04);
      text-align: center;
    }

    .fixed-metric-title {
      font-size: 10px;
      letter-spacing: 1px;
      opacity: .8;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .fixed-metric-value {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .fixed-metric-sub {
      font-size: 10px;
      opacity: .7;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: rgba(255, 252, 244, .1);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 6px;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #9cffc0 0%, #7dd3a0 100%);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    /* ✅ Formato "Buscado por Interpol" para Aduana */
    .wanted-card {
      display: none;
      flex-direction: column;
      padding: 20px 25px;
      min-height: 360px;
      position: relative;
      background: #5a1a1a;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(0, 0, 0, .2) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0, 0, 0, .15) 0%, transparent 50%),
        repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0, 0, 0, .05) 1px, rgba(0, 0, 0, .05) 2px);
      border-radius: 12px;
      border: 1px solid rgba(255, 252, 244, .12);
      overflow: hidden;
    }

    .wanted-card.active {
      display: flex;
    }

    .wanted-header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-bottom: 25px;
    }

    .wanted-logo {
      font-size: 14px;
      color: #fff;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .wanted-logo-icon {
      font-size: 24px;
      margin-bottom: 4px;
    }

    .wanted-main-title {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 3px;
      color: #fff;
      text-transform: uppercase;
      font-family: Arial, sans-serif;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, .3);
    }

    .wanted-content {
      display: flex;
      gap: 25px;
      align-items: flex-start;
      flex: 1;
    }

    .wanted-photo-container {
      flex-shrink: 0;
      background: #E6F3FF;
    }

    .wanted-photo {
      width: 160px;
      height: 200px;
      object-fit: cover;
      display: block;
      background: #E6F3FF;
    }

    .wanted-photo-placeholder {
      width: 160px;
      height: 200px;
      background: #E6F3FF;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: rgba(0, 0, 0, .2);
    }

    .wanted-info {
      flex: 1;
      color: #fff;
    }

    .wanted-name {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .wanted-divider {
      height: 1px;
      background: rgba(255, 252, 244, .6);
      margin: 10px 0;
    }

    .wanted-detail {
      margin: 8px 0;
      font-size: 13px;
    }

    .wanted-detail-label {
      font-weight: 700;
      margin-right: 8px;
    }

    .wanted-detail-value {
      font-weight: 400;
    }

    .wanted-footer {
      margin-top: 20px;
      font-size: 11px;
      color: rgba(255, 252, 244, .9);
      line-height: 1.6;
      text-align: left;
    }

    @media (max-width: 820px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .panel {
        min-height: 300px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header" style="position:relative;">
      <!-- 1. Clock (Left) -->
      <div class="clock-container" style="align-items:flex-start;">
        <div class="live-indicator">EN VIVO🟢</div>
        <div class="clock" id="clock">—</div>
      </div>

      <!-- 2. Title (Center) -->
      <div style="position:absolute; left:50%; top:50%; transform:translate(-50%, -50%); text-align:center;">
        <div class="title">✈️ VUELO SZ2803 — INFORMACIÓN AL PASAJERO</div>
        <div class="subtitle">Pasajeros · Horarios · Métricas · Aduana</div>
      </div>

      <!-- 3. Weather (Right) -->
      <div id="weather_widget"
        style="display:flex; gap:12px; background:rgba(255,252,244,0.08); padding:6px 14px; border-radius:12px; align-items:center;">
        <div style="text-align:right;">
          <div style="font-size:10px; opacity:0.7; letter-spacing:1px; font-weight:700;">VILLA DE MAYO</div>
          <div id="w_desc" style="font-size:11px; font-weight:600;">--</div>
        </div>
        <div id="w_icon" style="font-size:24px;">🌤️</div>
        <div style="display:flex; flex-direction:column; gap:2px;">
          <div id="w_temp" style="font-size:18px; font-weight:800; line-height:1;">--°</div>
          <div style="display:flex; gap:8px; font-size:10px; opacity:0.8;">
            <span id="w_rain">☔ --%</span>
            <span id="w_wind">💨 -- km/h</span>
          </div>
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">PASAJEROS</div>
          <div class="panel-kpi" id="pax_kpi">—</div>
        </div>
        <div class="panel-body">
          <div class="banner" id="pax_banner">Cargando…</div>
          <table>
            <thead>
              <tr>
                <th>AEROLINEA</th>
                <th>PASAJERO</th>
                <th>HORA</th>
                <th>MESA</th>
                <th>STATUS</th>
                <th>FOTO</th>
              </tr>
            </thead>
            <tbody id="pax_tbody"></tbody>
          </table>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">HORARIOS</div>
          <div class="panel-kpi" id="evt_kpi">—</div>
        </div>
        <div class="panel-body">
          <div class="banner" id="evt_banner">Cargando…</div>
          <table>
            <thead>
              <tr>
                <th>HORA</th>
                <th>EVENTO</th>
                <th>LOCACIÓN</th>
              </tr>
            </thead>
            <tbody id="evt_tbody"></tbody>
          </table>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">MÉTRICAS</div>
          <div class="panel-kpi" id="met_kpi">—</div>
        </div>
        <div class="panel-body">
          <div class="banner" id="met_banner">Cargando…</div>

          <!-- ✅ Métricas fijas -->
          <div id="met_fixed"></div>

          <!-- ✅ MÉTRICA DINÁMICA (lo que rota en /data/metrics) -->
          <div class="metric-card" id="met_card" style="display:none;">
            <div class="metric-icon" id="met_icon">✨</div>
            <div class="metric-text">
              <div class="metric-title" id="met_title">MÉTRICA</div>
              <div class="metric-value" id="met_value">—</div>
              <div class="metric-sub" id="met_sub"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">ADUANA</div>
          <div class="panel-kpi" id="adu_kpi">—</div>
        </div>
        <div class="panel-body">
          <div class="banner" id="adu_banner">Cargando…</div>
          <div id="adu_container"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function setBanner(id, msg, isErr = false) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = isErr ? "banner err" : "banner";
    }
    function asArray(x) { return Array.isArray(x) ? x : []; }

    function tickClock() {
      const d = new Date();
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      document.getElementById("clock").textContent = `${hh}:${mm}`;
    }
    setInterval(tickClock, 1000);
    tickClock();

    // ---------------- PASAJEROS ----------------
    let paxRows = [];
    let paxPage = 0;
    let paxPageSize = 8;

    function renderPassengers() {
      const tbody = document.getElementById("pax_tbody");
      tbody.innerHTML = "";

      const start = paxPage * paxPageSize;
      const slice = paxRows.slice(start, start + paxPageSize);

      slice.forEach(r => {
        const tr = document.createElement("tr");

        // 0) AEROLINEA LOGO
        const tdAir = document.createElement("td");
        const imgAir = document.createElement("img");
        imgAir.src = "/static/LOGO%20BODA%20HORIZONTAL.png";
        imgAir.style.height = "55px";
        imgAir.style.width = "auto";
        imgAir.style.display = "block";
        imgAir.style.margin = "0 auto";
        tdAir.appendChild(imgAir);
        tr.appendChild(tdAir);

        ["Pasajero", "Hora", "Mesa", "Checkin"].forEach(k => {
          const td = document.createElement("td");
          const v = (r[k] ?? "").toString();
          if (k === "Checkin") {
            if (v === "ON TIME") td.className = "status-on";
            else if (v === "DELAYED") td.className = "status-del";
          }
          td.textContent = v;
          tr.appendChild(td);
        });

        const tdSelfie = document.createElement("td");
        const url = (r["Selfie Aduana"] ?? "").toString().trim();
        if (url) {
          const img = document.createElement("img");
          img.className = "selfie";
          img.src = url;
          img.loading = "lazy";
          img.referrerPolicy = "no-referrer";
          img.onerror = () => {
            tdSelfie.innerHTML = "";
            const ph = document.createElement("div");
            ph.className = "selfie-empty";
            ph.textContent = "—";
            tdSelfie.appendChild(ph);
          };
          tdSelfie.appendChild(img);
        } else {
          const ph = document.createElement("div");
          ph.className = "selfie-empty";
          ph.textContent = "—";
          tdSelfie.appendChild(ph);
        }
        tr.appendChild(tdSelfie);

        tbody.appendChild(tr);
      });

      const total = paxRows.length;
      const ontime = paxRows.filter(r => r["Checkin"] === "ON TIME").length;
      document.getElementById("pax_kpi").textContent = `TOTAL ${total} · ON TIME ${ontime}`;
      setBanner("pax_banner", total ? "OK ✅" : "Sin pasajeros.");
    }

    async function fetchPassengers() {
      try {
        const res = await fetch("/data/passengers", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        paxRows = asArray(json.rows);
        paxPageSize = json.page_size || paxPageSize;
        const maxPage = Math.max(0, Math.ceil(paxRows.length / paxPageSize) - 1);
        if (paxPage > maxPage) paxPage = 0;
        renderPassengers();
      } catch (e) {
        setBanner("pax_banner", "Error /data/passengers:\n" + e, true);
      }
    }

    function rotatePassengers() {
      const maxPage = Math.max(0, Math.ceil(paxRows.length / paxPageSize) - 1);
      paxPage = maxPage === 0 ? 0 : (paxPage >= maxPage ? 0 : paxPage + 1);
      renderPassengers();
    }

    // ---------------- HORARIOS ----------------
    let evtRows = [], evtPage = 0, evtPageSize = 10;

    function renderEvents() {
      const tbody = document.getElementById("evt_tbody");
      tbody.innerHTML = "";

      const start = evtPage * evtPageSize;
      const slice = evtRows.slice(start, start + evtPageSize);

      slice.forEach(r => {
        const tr = document.createElement("tr");
        ["Hora", "Evento", "Locación"].forEach(k => {
          const td = document.createElement("td");
          td.textContent = (r[k] ?? "").toString();
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });

      document.getElementById("evt_kpi").textContent = `TOTAL ${evtRows.length}`;
      setBanner("evt_banner", evtRows.length ? "OK ✅" : "Sin horarios cargados.");
    }

    async function fetchEvents() {
      try {
        const res = await fetch("/data/events", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        evtRows = asArray(json.rows);
        evtPageSize = json.page_size || evtPageSize;
        const maxPage = Math.max(0, Math.ceil(evtRows.length / evtPageSize) - 1);
        if (evtPage > maxPage) evtPage = 0;
        renderEvents();
      } catch (e) {
        setBanner("evt_banner", "Error /data/events:\n" + e, true);
      }
    }

    function rotateEvents() {
      const maxPage = Math.max(0, Math.ceil(evtRows.length / evtPageSize) - 1);
      evtPage = maxPage === 0 ? 0 : (evtPage >= maxPage ? 0 : evtPage + 1);
      renderEvents();
    }

    // ---------------- MÉTRICAS ----------------
    function renderFixedMetrics(fixed) {
      const container = document.getElementById("met_fixed");
      container.innerHTML = "";

      // 1) Embarque completado
      const embarque = fixed.embarque_completado || {};
      const embarqueDiv = document.createElement("div");
      embarqueDiv.className = "fixed-metric";
      embarqueDiv.innerHTML = `
    <div class="fixed-metric-title">EMBARQUE COMPLETADO</div>
    <div class="fixed-metric-value">${embarque.porcentaje || 0}%</div>
    <div class="fixed-metric-sub">${embarque.completados || 0} / ${embarque.total || 0} invitados</div>
    <div class="progress-bar-container">
      <div class="progress-bar-fill" style="width: ${embarque.porcentaje || 0}%"></div>
    </div>
  `;
      container.appendChild(embarqueDiv);

      // 2) Ritmo de embarque
      const ritmo = fixed.ritmo_embarque || {};
      const ritmoDiv = document.createElement("div");
      ritmoDiv.className = "fixed-metric";
      ritmoDiv.innerHTML = `
    <div class="fixed-metric-title">RITMO DE EMBARQUE</div>
    <div class="fixed-metric-value">${ritmo.promedio_texto || "N/D"}</div>
    <div class="fixed-metric-sub">Promedio entre checkins</div>
  `;
      container.appendChild(ritmoDiv);

      // 3) Viaje Actual
      const viaje = fixed.viaje_actual || {};
      const viajeDiv = document.createElement("div");
      viajeDiv.className = "fixed-metric";
      viajeDiv.innerHTML = `
    <div class="fixed-metric-title">VIAJE ACTUAL</div>
    <div class="fixed-metric-value">${viaje.evento || "N/D"}</div>
    <div class="fixed-metric-sub">${viaje.hora || ""}</div>
  `;
      container.appendChild(viajeDiv);

      // 4) Próxima Escala
      const proxima = fixed.proxima_escala || {};
      const proximaDiv = document.createElement("div");
      proximaDiv.className = "fixed-metric";
      proximaDiv.innerHTML = `
    <div class="fixed-metric-title">PRÓXIMA ESCALA</div>
    <div class="fixed-metric-value">${proxima.evento || "N/D"}</div>
    <div class="fixed-metric-sub">${proxima.hora || ""}</div>
  `;
      container.appendChild(proximaDiv);

      // 5) Último Check-in
      const ultimo = fixed.ultimo_checkin || {};
      const ultimoDiv = document.createElement("div");
      ultimoDiv.className = "fixed-metric";
      ultimoDiv.innerHTML = `
    <div class="fixed-metric-title">ÚLTIMO CHECK-IN</div>
    <div class="fixed-metric-value">${ultimo.nombre || "N/D"}</div>
    <div class="fixed-metric-sub">${ultimo.hora || ""}</div>
  `;
      container.appendChild(ultimoDiv);
    }

    async function fetchMetrics() {
      try {
        const res = await fetch("/data/metrics", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();

        // ✅ Mostrar métricas fijas
        if (json.fixed_metrics) {
          renderFixedMetrics(json.fixed_metrics);
        }

        // ✅ Mostrar la métrica dinámica activa (la que rota)
        const active = json.active_metric;
        if (active) {
          document.getElementById("met_card").style.display = "flex";
          document.getElementById("met_icon").textContent = active.icon || "✨";
          document.getElementById("met_title").textContent = (active.title || "MÉTRICA").toUpperCase();
          document.getElementById("met_value").textContent = active.value || "—";
          document.getElementById("met_sub").textContent = active.subtitle || "";
        } else {
          document.getElementById("met_card").style.display = "none";
        }

        const dynamicCount = (json.dynamic_metrics || []).length;
        document.getElementById("met_kpi").textContent = dynamicCount ? `${dynamicCount} métricas dinámicas` : "PENDIENTE";
        setBanner("met_banner", json.fixed_metrics ? "OK ✅" : "Sin métricas (revisar backend).");
      } catch (e) {
        setBanner("met_banner", "Error /data/metrics:\n" + e, true);
      }
    }

    // ---------------- ADUANA ----------------
    let aduRows = [], aduCurrentIndex = 0, aduRotateSeconds = 5;

    function renderAduana() {
      const container = document.getElementById("adu_container");
      container.innerHTML = "";

      if (aduRows.length === 0) {
        setBanner("adu_banner", "Sin fotos de Aduana disponibles.");
        return;
      }

      // Crear cards para cada pasajero (solo mostrar el activo)
      aduRows.forEach((r, idx) => {
        const card = document.createElement("div");
        card.className = `wanted-card ${idx === aduCurrentIndex ? "active" : ""}`;

        // Header con logo y título
        // Header con logo y título (CENTRADOS)
        const header = document.createElement("div");
        header.className = "wanted-header";

        const logoIcon = document.createElement("div");
        logoIcon.className = "wanted-logo-icon";
        logoIcon.textContent = "🌍";
        logoIcon.style.marginBottom = "0"; // Reset margin
        header.appendChild(logoIcon);

        const mainTitle = document.createElement("div");
        mainTitle.className = "wanted-main-title";
        mainTitle.textContent = "INTERPOL WANTED";
        header.appendChild(mainTitle);

        card.appendChild(header);

        // Separador principal
        const mainDivider = document.createElement("div");
        mainDivider.className = "wanted-divider";
        mainDivider.style.marginBottom = "20px"; // Un poco más de espacio
        card.appendChild(mainDivider);

        // Contenido principal: foto e información
        const content = document.createElement("div");
        content.className = "wanted-content";

        // Foto tipo pasaporte
        const photoContainer = document.createElement("div");
        photoContainer.className = "wanted-photo-container";
        const photoUrl = (r["Selfie Aduana"] ?? "").toString().trim();

        if (photoUrl) {
          const img = document.createElement("img");
          img.className = "wanted-photo";
          img.src = photoUrl;
          img.loading = "lazy";
          img.referrerPolicy = "no-referrer";
          img.onerror = () => {
            const ph = document.createElement("div");
            ph.className = "wanted-photo-placeholder";
            ph.textContent = "⚠️";
            photoContainer.replaceChild(ph, img);
          };
          photoContainer.appendChild(img);
        } else {
          const ph = document.createElement("div");
          ph.className = "wanted-photo-placeholder";
          ph.textContent = "—";
          photoContainer.appendChild(ph);
        }
        content.appendChild(photoContainer);

        // Información del pasajero
        const info = document.createElement("div");
        info.className = "wanted-info";

        const nombre = (r["Pasajero"] ?? "").toString();
        if (nombre) {
          const nameDiv = document.createElement("div");
          nameDiv.className = "wanted-name";
          nameDiv.textContent = nombre.toUpperCase();
          info.appendChild(nameDiv);

          const divider1 = document.createElement("div");
          divider1.className = "wanted-divider";
          info.appendChild(divider1);
        }

        // 1) EDAD
        const edad = (r["Edad"] ?? "").toString();
        if (edad) {
          const rowDiv = document.createElement("div");
          rowDiv.className = "wanted-detail";
          rowDiv.innerHTML = `<span class="wanted-detail-label">EDAD:</span> <span class="wanted-detail-value">${edad}</span>`;
          info.appendChild(rowDiv);

          const div = document.createElement("div");
          div.className = "wanted-divider";
          info.appendChild(div);
        }

        // 2) VISTO EN (Random Country) -> BUSCADO EN
        const visto = (r["En"] ?? "").toString();
        if (visto) {
          const rowDiv = document.createElement("div");
          rowDiv.className = "wanted-detail";
          rowDiv.innerHTML = `<span class="wanted-detail-label">BUSCADO EN:</span> <span class="wanted-detail-value">${visto}</span>`;
          info.appendChild(rowDiv);

          const div = document.createElement("div");
          div.className = "wanted-divider";
          info.appendChild(div);
        }

        // 3) PELIGROSIDAD
        const peli = (r["Peligrosidad"] ?? "").toString();
        if (peli) {
          const rowDiv = document.createElement("div");
          rowDiv.className = "wanted-detail";
          rowDiv.innerHTML = `<span class="wanted-detail-label">PELIGROSIDAD:</span> <span class="wanted-detail-value">${peli}</span>`;
          info.appendChild(rowDiv);

          const div = document.createElement("div");
          div.className = "wanted-divider";
          info.appendChild(div);
        }

        // 4) MOTIVO (al final)
        const por = (r["Por"] ?? "").toString();
        if (por) {
          const rowDiv = document.createElement("div");
          rowDiv.className = "wanted-detail";
          rowDiv.innerHTML = `<span class="wanted-detail-label">MOTIVO:</span> <span class="wanted-detail-value">${por}</span>`;
          info.appendChild(rowDiv);
        }

        content.appendChild(info);
        card.appendChild(content);

        // Footer genérico (fuera del content)
        const footer = document.createElement("div");
        footer.className = "wanted-footer";
        footer.textContent = "SI TIENE ALGUNA INFORMACIÓN SOBRE ESTA PERSONA, POR FAVOR CONTACTE A SU POLICÍA LOCAL O A INTERPOL.";
        card.appendChild(footer);

        container.appendChild(card);
      });

      document.getElementById("adu_kpi").textContent = aduRows.length ? `TOTAL ${aduRows.length}` : "PENDIENTE";
      setBanner("adu_banner", aduRows.length ? "OK ✅" : "Sin fotos de Aduana.");
    }

    function rotateAduana() {
      if (aduRows.length === 0) return;
      aduCurrentIndex = (aduCurrentIndex + 1) % aduRows.length;
      renderAduana();
    }

    async function fetchAduana() {
      try {
        const res = await fetch("/data/aduana", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();

        aduRows = asArray(json.rows ?? []);
        aduRotateSeconds = json.rotate_seconds || 5;

        // Resetear índice si cambió la lista
        if (aduCurrentIndex >= aduRows.length) {
          aduCurrentIndex = 0;
        }

        renderAduana();
      } catch (e) {
        setBanner("adu_banner", "Error /data/aduana:\n" + e, true);
      }
    }

    // ---------------- CLIMA ----------------
    async function fetchWeather() {
      try {
        const res = await fetch("/data/weather");
        if (!res.ok) return;
        const w = await res.json();

        // w: { location, temp, icon, sky, rain_prob, wind }
        document.getElementById("w_temp").textContent = w.temp;
        document.getElementById("w_icon").textContent = w.icon;
        document.getElementById("w_desc").textContent = w.sky;
        document.getElementById("w_rain").textContent = `☔ ${w.rain_prob}`;
        document.getElementById("w_wind").textContent = `💨 ${w.wind}`;
      } catch (e) {
        console.error("Weather error:", e);
      }
    }

    fetchWeather();
    setInterval(fetchWeather, 300000); // 5 minutos

    // Start loops
    fetchPassengers();
    fetchEvents();
    fetchMetrics();
    fetchAduana();

    setInterval(fetchPassengers, 5000);
    setInterval(fetchEvents, 5000);
    setInterval(fetchMetrics, 4000);  // refresca seguido; el backend rota cada 12s
    setInterval(fetchAduana, 7000);

    setInterval(rotatePassengers, 5000);
    setInterval(rotateEvents, 6000);
    setInterval(rotateAduana, 5000);  // rota cada 5 segundos
  </script>
</body>

</html>
