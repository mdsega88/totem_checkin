<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard Totem SZ328</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #001a38;
      color: #fffcf4;
      height: 100vh;
      overflow: hidden;
    }

    .wrap {
      padding: 12px;
      height: 100%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      margin-bottom: 8px;
      flex-shrink: 0;
      border: 1px solid rgba(255, 252, 244, .12);
      border-radius: 14px;
      background: rgba(255, 252, 244, .04);
    }

    .title {
      font-size: 18px;
      letter-spacing: 1px;
      font-weight: 800;
    }

    .subtitle {
      font-size: 12px;
      opacity: .8;
    }

    .clock-container {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .live-indicator {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .clock {
      font-size: 12px;
      opacity: .85;
    }

    .grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      min-height: 0;
      /* Important for flex children scrolling/shrinking */
    }

    .panel {
      border: 1px solid rgba(255, 252, 244, .12);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255, 252, 244, .03);
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: rgba(255, 252, 244, .06);
      border-bottom: 1px solid rgba(255, 252, 244, .10);
    }

    .panel-title {
      font-size: 12px;
      letter-spacing: 1.6px;
      opacity: .9;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #9cffc0;
      border-radius: 50%;
      box-shadow: 0 0 8px #9cffc0;
      animation: pulse 2s ease-in-out infinite;
    }

    .panel-kpi {
      font-size: 12px;
      opacity: .85;
    }

    .panel-body {
      padding: 8px 10px;
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    thead {
      flex-shrink: 0;
    }

    tbody {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    tr {
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(255, 252, 244, .08);
      flex: 1;
      min-height: 0;
      width: 100%;
    }

    thead tr {
      flex: 0 0 auto;
      height: auto;
      min-height: 3vh;
    }

    th,
    td {
      flex: 1;
      padding: 2px 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.0vh;
      text-align: center;
      overflow: hidden;
      height: 100%;
      box-sizing: border-box;
    }

    th {
      font-size: 0.9vh;
      letter-spacing: 0.8px;
      opacity: .7;
      background: rgba(255, 252, 244, .06);
      font-weight: 800;
      text-transform: uppercase;
    }

    /* Column widths */
    th:nth-child(1),
    td:nth-child(1) {
      flex: 0 0 15%;
    }

    /* Aerolinea */
    th:nth-child(2),
    td:nth-child(2) {
      flex: 1;
      justify-content: flex-start;
      text-align: left;
      padding-left: 10px;
    }

    /* Pasajero */
    th:nth-child(3),
    td:nth-child(3) {
      flex: 0 0 10%;
    }

    /* Hora */
    th:nth-child(4),
    td:nth-child(4) {
      flex: 0 0 10%;
    }

    /* Mesa */
    th:nth-child(5),
    td:nth-child(5) {
      flex: 0 0 15%;
    }

    /* Status */
    th:nth-child(6),
    td:nth-child(6) {
      flex: 0 0 8%;
    }

    /* Foto */

    #pax_tbody td {
      font-weight: 800;
      text-transform: uppercase;
    }

    .status-on {
      color: #9cffc0;
      font-weight: 800;
    }

    .status-del {
      color: #d43735;
      font-weight: 800;
    }

    .selfie {
      width: 34px;
      height: 46px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid rgba(255, 252, 244, .18);
      background: rgba(255, 252, 244, .06);
      display: inline-block;
    }

    .selfie-empty {
      width: 34px;
      height: 46px;
      border-radius: 8px;
      border: 1px dashed rgba(255, 252, 244, .18);
      opacity: .5;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .banner {
      margin-bottom: 6px;
      padding: 4px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 252, 244, .12);
      background: rgba(255, 252, 244, .04);
      font-size: 11px;
      opacity: .9;
      white-space: pre-wrap;
      flex-shrink: 0;
    }

    .err {
      border-color: rgba(255, 80, 80, .35);
      background: rgba(255, 80, 80, .10);
    }

    /* ✅ Métricas compactas */
    #met_fixed {
      display: grid;
      grid-template-columns: 3fr 1fr;
      gap: 8px;
      flex-shrink: 0;
    }

    .metric-card {
      position: relative;
      /* Para contener el contador absoluto */
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 252, 244, .12);
      background: rgba(255, 252, 244, .04);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .metric-icon {
      font-size: 22px;
    }

    .metric-text {
      text-align: center;
    }

    .metric-title {
      font-size: 1.0vh;
      letter-spacing: 1px;
      opacity: .85;
      font-weight: 800;
    }

    .metric-value {
      font-size: 1.5vh;
      font-weight: 900;
      margin-top: 1px;
    }

    .metric-sub {
      font-size: 1.0vh;
      opacity: .75;
      margin-top: 1px;
    }

    .fixed-metric {
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid rgba(255, 252, 244, .12);
      background: rgba(255, 252, 244, .04);
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .fixed-metric-title {
      font-size: 0.9vh;
      letter-spacing: 0.8px;
      opacity: .8;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .fixed-metric-value {
      font-size: 1.2vh;
      font-weight: 800;
      margin-bottom: 2px;
    }

    .fixed-metric-sub {
      font-size: 0.9vh;
      opacity: .7;
    }

    .progress-bar-container {
      width: 100%;
      height: 4px;
      background: rgba(255, 252, 244, .1);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #9cffc0 0%, #7dd3a0 100%);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    /* ✅ Formato "Buscado por Interpol" para Aduana */
    .wanted-card {
      display: none;
      flex-direction: column;
      padding: 1vh 2vh;
      height: 100%;
      box-sizing: border-box;
      position: relative;
      background: #5a1a1a;
      /* RED for Interpol */
      background-image:
        radial-gradient(circle at 20% 30%, rgba(0, 0, 0, .2) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0, 0, 0, .15) 0%, transparent 50%);
      border-radius: 8px;
      border: 1px solid rgba(255, 252, 244, .12);
      overflow: hidden;
      justify-content: center;
    }

    .wanted-card.captain-card {
      background: #001a38;
      /* BLUE for Captains */
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, .05) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255, 255, 255, .02) 0%, transparent 50%);
      border-color: rgba(255, 252, 244, .2);
    }

    .wanted-card.active {
      display: flex;
    }

    .wanted-header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 0.5vh;
    }

    .wanted-logo {
      font-size: 14px;
      color: #fff;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .wanted-logo-icon {
      font-size: 24px;
      margin-bottom: 4px;
    }

    .wanted-main-title {
      font-size: 2.5vh;
      font-weight: 900;
      letter-spacing: 2px;
      color: #fff;
      text-transform: uppercase;
      font-family: Arial, sans-serif;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, .3);
    }

    .wanted-content {
      display: flex;
      gap: 25px;
      align-items: flex-start;
      flex: 1;
    }

    .wanted-photo-container {
      flex-shrink: 0;
      background: #E6F3FF;
    }

    .wanted-photo {
      width: 12vh;
      height: 16vh;
      object-fit: cover;
      display: block;
      background: #E6F3FF;
      border: 2px solid #fff;
    }

    .wanted-photo-placeholder {
      width: 160px;
      height: 200px;
      background: #E6F3FF;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: rgba(0, 0, 0, .2);
    }

    .wanted-info {
      flex: 1;
      color: #fff;
    }

    .wanted-name {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .wanted-divider {
      height: 1px;
      background: rgba(255, 252, 244, .3);
      margin: 14px 0;
    }

    .wanted-detail {
      margin: 12px 0;
      font-size: 13px;
    }

    .wanted-detail-label {
      font-weight: 700;
      margin-right: 8px;
    }

    .wanted-detail-value {
      font-weight: 400;
    }

    .wanted-footer {
      margin-top: 10px;
      font-size: 9px;
      color: rgba(255, 252, 244, .9);
      line-height: 1.4;
      text-align: left;
    }

    @media (max-width: 820px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .panel {
        min-height: 300px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header" style="position:relative;">
      <!-- 1. Clock (Left) -->
      <div class="clock-container" style="align-items:flex-start;">
        <div class="live-indicator">EN VIVO🟢</div>
        <div class="clock" id="clock">—</div>
      </div>

      <!-- 2. Title (Center) -->
      <div style="position:absolute; left:50%; top:50%; transform:translate(-50%, -50%); text-align:center;">
        <div class="title">✈️ VUELO SZ2803 — INFORMACIÓN AL PASAJERO</div>
        <div class="subtitle">Pasajeros · Métricas · Aduana</div>
      </div>

      <!-- 3. Weather (Right) -->
      <div id="weather_widget"
        style="display:flex; gap:12px; background:rgba(255,252,244,0.08); padding:6px 14px; border-radius:12px; align-items:center;">
        <div style="text-align:right;">
          <div style="font-size:10px; opacity:0.7; letter-spacing:1px; font-weight:700;">VILLA DE MAYO</div>
          <div id="w_desc" style="font-size:11px; font-weight:600;">--</div>
        </div>
        <div id="w_icon" style="font-size:24px;">🌤️</div>
        <div style="display:flex; flex-direction:column; gap:2px;">
          <div id="w_temp" style="font-size:18px; font-weight:800; line-height:1;">--°</div>
          <div style="display:flex; gap:8px; font-size:10px; opacity:0.8;">
            <span id="w_rain">☔ --%</span>
            <span id="w_wind">💨 -- km/h</span>
          </div>
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="panel" style="flex: 2;">
        <div class="panel-head">
          <div class="panel-title"><span class="status-dot"></span> PASAJEROS</div>
          <div class="panel-kpi" id="pax_kpi">—</div>
        </div>
        <div class="panel-body">
          <table>
            <thead>
              <tr>
                <th>AEROLINEA</th>
                <th>PASAJERO</th>
                <th>HORA</th>
                <th>MESA</th>
                <th>STATUS</th>
                <th>FOTO</th>
              </tr>
            </thead>
            <tbody id="pax_tbody"></tbody>
          </table>
        </div>
      </div>


      <div class="panel" style="flex: 2;">
        <div class="panel-head">
          <div class="panel-title"><span class="status-dot"></span> ADUANA</div>
          <div class="panel-kpi" id="adu_kpi">—</div>
        </div>
        <div class="panel-body">
          <div id="adu_container"></div>
        </div>
      </div>

      <div class="panel" style="flex: 1.5;">
        <div class="panel-head">
          <div class="panel-title"><span class="status-dot"></span> MÉTRICAS</div>
          <div class="panel-kpi" id="met_kpi">—</div>
        </div>
        <div class="panel-body">

          <!-- ✅ Métricas fijas -->
          <div id="met_fixed"></div>

          <!-- ✅ Último Check-in (Full Width) -->
          <div id="met_last_checkin"></div>

          <!-- ✅ MÉTRICA DINÁMICA (lo que rota en /data/metrics) -->
          <div class="metric-card" id="met_card" style="display:none;">
            <div class="metric-icon" id="met_icon">✨</div>
            <div class="metric-text">
              <div class="metric-title" id="met_title">MÉTRICA</div>
              <div class="metric-value" id="met_value">—</div>
              <div class="metric-sub" id="met_sub"></div>
            </div>
            <div id="met_counter"
              style="position:absolute; bottom:5px; right:10px; font-size:0.8vh; opacity:0.5; font-weight:800;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function setBanner(id, msg, isErr = false) {
      // Banners removed from UI, function simplified
    }
    function asArray(x) { return Array.isArray(x) ? x : []; }

    function tickClock() {
      const d = new Date();
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      document.getElementById("clock").textContent = `${hh}:${mm}`;
    }
    setInterval(tickClock, 1000);
    tickClock();

    // ---------------- PASAJEROS ----------------
    let paxRows = [];
    let paxPage = 0;
    let paxPageSize = 5; // Valor por defecto, se ajustará dinámicamente o por config

    function renderPassengers() {
      const tbody = document.getElementById("pax_tbody");
      tbody.innerHTML = "";

      let start = paxPage * paxPageSize;

      // LOGICA ESPECIAL: Si es la última página y no está completa, retrocedemos 
      // para mostrar siempre paxPageSize elementos (si hay suficientes)
      if (start + paxPageSize > paxRows.length && paxRows.length > paxPageSize) {
        start = paxRows.length - paxPageSize;
      }

      const slice = paxRows.slice(start, start + paxPageSize);

      slice.forEach(r => {
        const tr = document.createElement("tr");

        // 0) AEROLINEA LOGO
        const tdAir = document.createElement("td");
        const imgAir = document.createElement("img");
        imgAir.src = "/static/LOGO%20BODA%20HORIZONTAL.png";
        imgAir.style.height = "2vh";
        imgAir.style.width = "auto";
        imgAir.style.display = "block";
        imgAir.style.margin = "0 auto";
        tdAir.appendChild(imgAir);
        tr.appendChild(tdAir);

        ["Pasajero", "Hora", "Mesa", "Checkin"].forEach(k => {
          const td = document.createElement("td");
          const v = (r[k] ?? "").toString();
          if (k === "Checkin") {
            if (v === "ON TIME") td.className = "status-on";
            else if (v === "DELAYED") td.className = "status-del";
          }
          td.textContent = v;
          tr.appendChild(td);
        });

        const tdSelfie = document.createElement("td");
        const url = (r["Selfie Aduana"] ?? "").toString().trim();
        if (url) {
          const img = document.createElement("img");
          img.style.height = "3vh";
          img.style.width = "auto";
          img.style.aspectRatio = "3/4";
          img.style.objectFit = "cover";
          img.style.borderRadius = "4px";
          img.style.border = "1px solid rgba(255, 252, 244, .18)";
          img.src = url;
          img.loading = "lazy";
          img.referrerPolicy = "no-referrer";
          img.onerror = () => {
            tdSelfie.innerHTML = "—";
          };
          tdSelfie.appendChild(img);
        } else {
          tdSelfie.textContent = "—";
        }
        tr.appendChild(tdSelfie);

        tbody.appendChild(tr);
      });

      const total = paxRows.length;
      const ontime = paxRows.filter(r => r["Checkin"] === "ON TIME").length;
      document.getElementById("pax_kpi").textContent = `TOTAL ${total} · ON TIME ${ontime}`;
      setBanner("pax_banner", total ? "OK ✅" : "Sin pasajeros.");
    }

    async function fetchPassengers() {
      try {
        const res = await fetch("/data/passengers", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        paxRows = asArray(json.rows);
        paxPageSize = json.page_size || paxPageSize;
        const maxPage = Math.max(0, Math.ceil(paxRows.length / paxPageSize) - 1);
        if (paxPage > maxPage) paxPage = 0;
        renderPassengers();
      } catch (e) {
        setBanner("pax_banner", "Error /data/passengers:\n" + e, true);
      }
    }

    function rotatePassengers() {
      const maxPage = Math.max(0, Math.ceil(paxRows.length / paxPageSize) - 1);
      paxPage = maxPage === 0 ? 0 : (paxPage >= maxPage ? 0 : paxPage + 1);
      renderPassengers();
    }


    // ---------------- MÉTRICAS ----------------
    function renderFixedMetrics(fixed) {
      // 1) Contenedor de métricas fijas apiladas
      const container = document.getElementById("met_fixed");
      container.innerHTML = "";

      // 1.a) Completitud de Embarque
      const embarque = fixed.embarque_completado || {};
      const embarqueDiv = document.createElement("div");
      embarqueDiv.className = "fixed-metric";
      embarqueDiv.style.padding = "10px";
      embarqueDiv.innerHTML = `
        <div class="fixed-metric-title">% COMPLETITUD EMBARQUE</div>
        <div class="fixed-metric-value">${embarque.porcentaje || 0}%</div>
        <div class="fixed-metric-sub" style="color: ${embarque.status_color || '#fff'}; font-weight: 900; font-size: 1.1vh; text-transform: uppercase;">
          ${embarque.status_text || ""}
        </div>
        <div class="progress-bar-container" style="height: 10px; margin-top: 8px;">
          <div class="progress-bar-fill" style="width: ${embarque.porcentaje || 0}%; background: ${embarque.status_color || '#16A34A'}; shadow: 0 0 10px ${embarque.status_color || '#16A34A'}; transition: all 1s ease;"></div>
        </div>
      `;
      container.appendChild(embarqueDiv);

      // 1.b) Ritmo de embarque
      const ritmo = fixed.ritmo_embarque || {};
      const ritmoDiv = document.createElement("div");
      ritmoDiv.className = "fixed-metric";
      ritmoDiv.innerHTML = `
        <div class="fixed-metric-title">RITMO DE EMBARQUE REAL</div>
        <div class="fixed-metric-value" style="font-size: 1.4vh;">${ritmo.promedio_texto || "N/D"}</div>
        <div class="fixed-metric-sub">Promedio entre checkins</div>
      `;
      container.appendChild(ritmoDiv);

      // 2) Último Check-in (ANCHO COMPLETO - estilo metric-card)
      const lastCheckinContainer = document.getElementById("met_last_checkin");
      lastCheckinContainer.innerHTML = "";

      const ultimo = fixed.ultimo_checkin || {};
      const ultimoDiv = document.createElement("div");
      ultimoDiv.className = "metric-card"; // Estilo igual al de las rotativas
      ultimoDiv.style.display = "flex";
      ultimoDiv.style.marginTop = "10px";
      ultimoDiv.style.background = "rgba(255, 252, 244, .08)"; // Un pelín más claro para destacar
      ultimoDiv.innerHTML = `
        <div class="metric-icon">🕒</div>
        <div class="metric-text">
          <div class="metric-title">ÚLTIMO CHECK-IN</div>
          <div class="metric-value" style="font-size: 1.6vh;">${ultimo.nombre || "N/D"}</div>
          <div class="metric-sub">${ultimo.hora || ""}</div>
        </div>
      `;
      lastCheckinContainer.appendChild(ultimoDiv);
    }

    async function fetchMetrics() {
      try {
        const res = await fetch("/data/metrics", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();

        // ✅ Mostrar métricas fijas
        if (json.fixed_metrics) {
          renderFixedMetrics(json.fixed_metrics);
        }

        // ✅ Mostrar la métrica dinámica activa (la que rota)
        const active = json.active_metric;
        const allDynamic = json.dynamic_metrics || [];
        const dynamicCount = allDynamic.length;

        if (active) {
          document.getElementById("met_card").style.display = "flex";
          document.getElementById("met_icon").textContent = active.icon || "✨";
          document.getElementById("met_title").textContent = (active.title || "MÉTRICA").toUpperCase();
          document.getElementById("met_value").textContent = active.value || "—";
          document.getElementById("met_sub").textContent = active.subtitle || "";

          // Encontrar posición actual
          const currentIdx = allDynamic.findIndex(m => m.title === active.title && m.value === active.value);
          if (currentIdx !== -1) {
            document.getElementById("met_counter").textContent = `${currentIdx + 1} / ${dynamicCount}`;
          }
        } else {
          document.getElementById("met_card").style.display = "none";
        }

        document.getElementById("met_kpi").textContent = dynamicCount ? `${dynamicCount} DATOS EN ROTACIÓN` : "PENDIENTE";
        setBanner("met_banner", json.fixed_metrics ? "OK ✅" : "Sin métricas (revisar backend).");
      } catch (e) {
        setBanner("met_banner", "Error /data/metrics:\n" + e, true);
      }
    }

    // ---------------- ADUANA / CAPITANES ----------------
    let aduData = { aduana: [], capitanes: [] };
    let aduMode = "wanted"; // "wanted" o "capitanes"
    let aduIdx = 0;
    let capIdx = 0;

    function startCapitanesPass() {
      if (aduMode !== "capitanes" && aduData.capitanes.length > 0) {
        aduMode = "capitanes";
        capIdx = 0; // Iniciar pasada desde el primero
        renderAduana();
      }
    }
    // Iniciar pasada de capitanes cada 1 minuto (60 segundos)
    setInterval(startCapitanesPass, 60000);

    function renderAduana() {
      const container = document.getElementById("adu_container");
      container.innerHTML = "";

      let rows = (aduMode === "wanted") ? aduData.aduana : aduData.capitanes;
      let idx = (aduMode === "wanted") ? aduIdx : capIdx;

      if (rows.length === 0) {
        if (aduMode === "capitanes") {
          // Si no hay capitanes, volver a aduana
          rows = aduData.aduana;
          idx = aduIdx;
        }
        if (!rows || rows.length === 0) {
          setBanner("adu_banner", "Sin fotos de Aduana/Capitanes disponibles.");
          return;
        }
      }

      const r = rows[idx];
      const card = document.createElement("div");
      card.className = (aduMode === "wanted") ? "wanted-card active" : "wanted-card active captain-card";

      // Header
      const header = document.createElement("div");
      header.className = "wanted-header";

      const logoIcon = document.createElement("div");
      logoIcon.className = "wanted-logo-icon";
      logoIcon.textContent = (aduMode === "wanted") ? "🌍" : "👨‍✈️";
      header.appendChild(logoIcon);

      const mainTitle = document.createElement("div");
      mainTitle.className = "wanted-main-title";
      mainTitle.textContent = (aduMode === "wanted") ? "INTERPOL WANTED" : "CAPITÁN DE MESA";
      header.appendChild(mainTitle);

      card.appendChild(header);

      const mainDivider = document.createElement("div");
      mainDivider.className = "wanted-divider";
      mainDivider.style.marginBottom = "1.5vh";
      card.appendChild(mainDivider);

      const content = document.createElement("div");
      content.className = "wanted-content";

      // Foto
      const photoContainer = document.createElement("div");
      photoContainer.className = "wanted-photo-container";
      const photoUrl = (aduMode === "wanted") ? (r["Selfie Aduana"] ?? "") : (r["Foto"] ?? "");

      if (photoUrl && photoUrl.toString().trim() !== "") {
        const img = document.createElement("img");
        img.className = "wanted-photo";
        img.src = photoUrl.toString().trim();
        img.loading = "lazy";
        img.referrerPolicy = "no-referrer";
        img.onerror = () => {
          const ph = document.createElement("div");
          ph.className = "wanted-photo-placeholder";
          ph.textContent = "⚠️";
          photoContainer.replaceChild(ph, img);
        };
        photoContainer.appendChild(img);
      } else {
        const ph = document.createElement("div");
        ph.className = "wanted-photo-placeholder";
        ph.textContent = "—";
        photoContainer.appendChild(ph);
      }
      content.appendChild(photoContainer);

      // Info
      const info = document.createElement("div");
      info.className = "wanted-info";

      const nombre = (r["Pasajero"] ?? "").toString();
      if (nombre) {
        const nameDiv = document.createElement("div");
        nameDiv.className = "wanted-name";
        nameDiv.style.fontSize = "2.1vh";
        nameDiv.textContent = nombre.toUpperCase();
        info.appendChild(nameDiv);

        const divider1 = document.createElement("div");
        divider1.className = "wanted-divider";
        info.appendChild(divider1);
      }

      if (aduMode === "wanted") {
        // 1) Línea de EDAD y ESTADO CIVIL
        const edad = (r["Edad"] ?? "").toString();
        const estado = (r["Estado Civil"] ?? "").toString();
        if (edad || estado) {
          const rowDiv = document.createElement("div");
          rowDiv.className = "wanted-detail";
          rowDiv.style.fontSize = "1.2vh";
          rowDiv.style.fontWeight = "400";
          let html = "";
          if (edad) html += `<span class="wanted-detail-label">EDAD:</span> <span class="wanted-detail-value">${edad}</span>`;
          if (edad && estado) html += ` <span style="margin:0 10px; opacity:0.5;">|</span> `;
          if (estado) html += `<span class="wanted-detail-label">ESTADO CIVIL:</span> <span class="wanted-detail-value">${estado.toUpperCase()}</span>`;
          rowDiv.innerHTML = html;
          info.appendChild(rowDiv);

          const div = document.createElement("div");
          div.className = "wanted-divider";
          info.appendChild(div);
        }

        // 2) Línea de PELIGROSIDAD y BUSCADO EN
        const peli = (r["Peligrosidad"] ?? "").toString();
        const en = (r["En"] ?? "").toString();
        if (peli || en) {
          const rowDiv = document.createElement("div");
          rowDiv.className = "wanted-detail";
          rowDiv.style.fontSize = "1.2vh";
          rowDiv.style.fontWeight = "400";
          let html = "";
          if (peli) html += `<span class="wanted-detail-label">PELIGROSIDAD:</span> <span class="wanted-detail-value">${peli}</span>`;
          if (peli && en) html += ` <span style="margin:0 10px; opacity:0.5;">|</span> `;
          if (en) html += `<span class="wanted-detail-label">BUSCADO EN:</span> <span class="wanted-detail-value">${en.toUpperCase()}</span>`;
          rowDiv.innerHTML = html;
          info.appendChild(rowDiv);

          const div = document.createElement("div");
          div.className = "wanted-divider";
          info.appendChild(div);
        }

        // 3) MOTIVO (Solo y Grande)
        const por = (r["Por"] ?? "").toString();
        if (por) {
          const rowDiv = document.createElement("div");
          rowDiv.className = "wanted-detail";
          rowDiv.style.fontSize = "1.8vh";
          rowDiv.style.fontWeight = "900";
          rowDiv.innerHTML = `<span class="wanted-detail-label">MOTIVO:</span> <span class="wanted-detail-value">${por}</span>`;
          info.appendChild(rowDiv);

          const div = document.createElement("div");
          div.className = "wanted-divider";
          info.appendChild(div);
        }
      }
      else {
        // Texto de Capitán
        const capText = document.createElement("div");
        capText.className = "wanted-detail";
        capText.style.fontSize = "1.2vh";
        capText.style.lineHeight = "1.4";
        capText.style.textAlign = "justify";
        capText.innerHTML = `La ADUANA ha detectado que esta persona ha sido seleccionada por los controles aduaneros, y deberá seguir las instrucciones de la tripulación en el video inicial que será presentado en el salón principal.`;
        info.appendChild(capText);

        if (r["Mesa"]) {
          const mesaDiv = document.createElement("div");
          mesaDiv.style.marginTop = "1vh";
          mesaDiv.style.fontWeight = "900";
          mesaDiv.textContent = `MESA ASIGNADA: ${r["Mesa"]}`;
          info.appendChild(mesaDiv);
        }
      }

      content.appendChild(info);
      card.appendChild(content);

      const footer = document.createElement("div");
      footer.className = "wanted-footer";
      footer.textContent = (aduMode === "wanted")
        ? "SI TIENE ALGUNA INFORMACIÓN SOBRE ESTA PERSONA, POR FAVOR CONTACTE A SU POLICÍA LOCAL O A INTERPOL."
        : "PERSONAL AUTORIZADO - TRIPULACIÓN DE CABINA";
      card.appendChild(footer);

      // ✅ Contador de posición (ej: 1 / 27)
      if (rows.length > 0) {
        const counter = document.createElement("div");
        counter.style.position = "absolute";
        counter.style.bottom = "8px";
        counter.style.right = "12px";
        counter.style.fontSize = "1vh";
        counter.style.opacity = "0.6";
        counter.style.fontWeight = "900";
        counter.textContent = `${idx + 1} / ${rows.length}`;
        card.appendChild(counter);
      }

      container.appendChild(card);

      // Update KPI
      document.getElementById("adu_kpi").textContent = (aduMode === "wanted")
        ? `WANTED: ${aduData.aduana.length}`
        : `CAPITANES: ${aduData.capitanes.length}`;
      setBanner("adu_banner", rows.length ? "OK ✅" : "Sin fotos de Aduana/Capitanes.");
    }

    function rotateAduana() {
      if (aduMode === "wanted") {
        if (aduData.aduana.length === 0) return;
        aduIdx = (aduIdx + 1) % aduData.aduana.length;
      } else {
        if (aduData.capitanes.length === 0) return;
        capIdx++;
        if (capIdx >= aduData.capitanes.length) {
          // Finalizó la pasada de capitanes, volver a INTERPOL
          capIdx = 0;
          aduMode = "wanted";
          if (aduData.aduana.length > 0) {
            aduIdx = (aduIdx + 1) % aduData.aduana.length;
          }
        }
      }
      renderAduana();
    }

    async function fetchAduana() {
      try {
        const res = await fetch("/data/aduana", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();

        aduData.aduana = asArray(json.aduana ?? []);
        aduData.capitanes = asArray(json.capitanes ?? []);

        renderAduana();
      } catch (e) {
        console.error("Error fetching aduana/capitanes:", e);
        setBanner("adu_banner", "Error /data/aduana:\n" + e, true);
      }
    }

    // ---------------- CLIMA ----------------
    async function fetchWeather() {
      try {
        const res = await fetch("/data/weather");
        if (!res.ok) return;
        const w = await res.json();

        // w: { location, temp, icon, sky, rain_prob, wind }
        document.getElementById("w_temp").textContent = w.temp;
        document.getElementById("w_icon").textContent = w.icon;
        document.getElementById("w_desc").textContent = w.sky;
        document.getElementById("w_rain").textContent = `☔ ${w.rain_prob}`;
        document.getElementById("w_wind").textContent = `💨 ${w.wind}`;
      } catch (e) {
        console.error("Weather error:", e);
      }
    }

    fetchWeather();
    setInterval(fetchWeather, 300000); // 5 minutos

    // Start loops
    fetchPassengers();
    fetchMetrics();
    fetchAduana();

    setInterval(fetchPassengers, 5000);
    setInterval(fetchMetrics, 4000);  // refresca seguido; el backend rota cada 12s
    setInterval(fetchAduana, 7000);

    setInterval(rotatePassengers, 5000);
    setInterval(rotateAduana, 5000);  // rota cada 5 segundos
  </script>
</body>

</html>
